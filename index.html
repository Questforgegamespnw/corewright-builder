<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Questforge Corewright Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Georgia, serif; margin:0; background:#e8dcc3; }

#splash {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(#2f2a24,#5a4a32);
  color:#fdf6e3;
}

.container { max-width:1100px; margin:auto; padding:15px; }
.card { background:#fdf6e3; padding:15px; margin-bottom:15px; border:2px solid #8b7355; border-radius:10px; }

button { margin:5px; padding:10px; font-size:1em; }

.nav {
  text-align:center;
  background:#5a4a32;
  padding:10px;
  position: sticky;
  top: 0;
}
.nav a {
  color:#fdf6e3;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

#statblock {
  background:#fdf1dc;
  border:2px solid #3b2f1b;
  border-radius:6px;
  padding:16px;
}

.stat-header { border-bottom:3px solid #3b2f1b; margin-bottom:8px; }
.stat-name { font-size:1.6em; font-weight:bold; }

.stat-section { border-top:2px solid #3b2f1b; margin-top:10px; padding-top:6px; }

@media print {
  body * { visibility:hidden; }
  #statblock, #statblock * { visibility:visible; }
  #statblock { position:absolute; top:0; left:0; width:100%; border:none; }
  button { display:none; }
}
</style>
</head>

<body>

<div class="nav">
  <a href="./">Builder</a>
  <a href="./infusions/">Infusions</a>
  <a href="./corewright/">Subclass</a>
</div>

<div id="splash">
  <h1>Questforge Corewright Interface</h1>
  <button onclick="enterApp()">Enter Workshop</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="card">
<h2>Assembly</h2>

Level <input id="level" type="number" value="10"><br>
INT Mod <input id="int" type="number" value="4"><br>

Engine
<select id="engine">
<option value="none">None</option>
<option value="flame">Flame</option>
<option value="stone">Stone</option>
<option value="frost">Frost</option>
<option value="aether">Aether</option>
</select>

<br><br>

Mode
<select id="mode">
<option value="single">Single Golem</option>
<option value="multi">Multi-Golem</option>
<option value="fusion">Fusion Mode</option>
</select>

<div id="infusions"></div>

<br>
<button onclick="printGolem()">Print / Save PDF</button>
<button onclick="downloadTxt()">Download .txt</button>
<button onclick="saveBuild()">Save Build</button>
<button onclick="loadBuild()">Load Build</button>
<button onclick="shareBuild()">Share Build</button>
</div>

<div id="golem2" class="card" style="display:none;">
<h2>Second Golem</h2>

Level <input id="level2" type="number" value="10"><br>
INT Mod <input id="int2" type="number" value="4"><br>

Engine
<select id="engine2">
<option value="none">None</option>
<option value="flame">Flame</option>
<option value="stone">Stone</option>
<option value="frost">Frost</option>
<option value="aether">Aether</option>
</select>

<div id="infusions2"></div>
</div>

<div class="card">
<h2>Golem Stat Block</h2>
<div id="statblock"></div>
</div>

</div>
</div>

<script src="js/infusions.js"></script>

<script>

function enterApp(){
 document.getElementById('splash').style.display='none';
 document.getElementById('app').style.display='block';
}

// INFUSIONS RENDER
function renderInfusions(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "<h3>Infusions</h3>";

  Object.entries(INFUSIONS).forEach(([key, infusion]) => {
    container.innerHTML += `
      <label>
        <input type="checkbox" value="${key}">
        ${infusion.name}
      </label><br>
    `;
  });
}

renderInfusions("infusions");
renderInfusions("infusions2");

function getSelectedInfusions(container="infusions") {
  return [...document.querySelectorAll(`#${container} input:checked`)]
    .map(cb => cb.value);
}

// CREATE GOLEM
function createGolem(levelId, intId, engineId, infusionContainer) {

  const level = parseInt(document.getElementById(levelId).value);
  const intMod = parseInt(document.getElementById(intId).value);

  const player = {
    level,
    intMod,
    pb: Math.ceil((level - 1)/4) + 1
  };

  let golem = {
    hp: 50,
    ac: 15,
    str: 14,
    con: 14,
    dex: 10,
    speed: 30,
    reach: 5
  };

  const engine = document.getElementById(engineId).value;

  if (engine === "flame") golem.bonusDamage = intMod;
  if (engine === "stone") golem.damageReduction = player.pb;
  if (engine === "aether") golem.flySpeed = golem.speed;

  getSelectedInfusions(infusionContainer)
    .forEach(key => INFUSIONS[key]?.apply(golem, player));

  return golem;
}

// RENDER STAT BLOCK
function renderStatBlock(golem, name) {
  return `
    <div class="stat-section">
      <div class="stat-name">${name}</div>
      <div><strong>AC</strong> ${golem.ac} | <strong>HP</strong> ${golem.hp}</div>
      <div>STR ${golem.str} DEX ${golem.dex} CON ${golem.con}</div>
      <div>Speed ${golem.speed} ft${golem.flySpeed ? ", fly "+golem.flySpeed : ""}</div>
    </div>
  `;
}

// BUILD
function buildGolem() {

  const mode = document.getElementById("mode").value;

  const g1 = createGolem("level","int","engine","infusions");

  let output = "";

  if (mode === "single") {
    output = renderStatBlock(g1, "Golem");
  }

  if (mode === "multi") {
    const g2 = createGolem("level2","int2","engine2","infusions2");

    output =
      renderStatBlock(g1, "Golem One") +
      renderStatBlock(g2, "Golem Two");
  }

  if (mode === "fusion") {
    const g2 = createGolem("level2","int2","engine2","infusions2");

    const fused = {
      hp: g1.hp + g2.hp,
      ac: Math.max(g1.ac, g2.ac),
      str: Math.max(g1.str, g2.str),
      dex: Math.max(g1.dex, g2.dex),
      con: Math.max(g1.con, g2.con),
      speed: Math.max(g1.speed, g2.speed),
      reach: Math.max(g1.reach, g2.reach) + 5
    };

    output = renderStatBlock(fused, "Fused Golem");
  }

  document.getElementById("statblock").innerHTML = output;
}

// MODE TOGGLE
document.getElementById("mode").addEventListener("change", () => {
  const mode = document.getElementById("mode").value;

  document.getElementById("golem2").style.display =
    (mode === "multi" || mode === "fusion") ? "block" : "none";

  buildGolem();
});

// DEBOUNCE
let timeout;
function triggerBuild() {
  clearTimeout(timeout);
  timeout = setTimeout(buildGolem, 100);
}

// AUTO UPDATE
["level","int","engine","mode"].forEach(id=>{
  document.getElementById(id).addEventListener("input", triggerBuild);
});
document.getElementById("infusions").addEventListener("change", triggerBuild);
document.getElementById("golem2").addEventListener("input", triggerBuild);
document.getElementById("infusions2").addEventListener("change", triggerBuild);

// SAVE
function saveBuild() {
  const name = prompt("Name your build:");
  if (!name) return;

  const build = {
    level: level.value,
    int: int.value,
    engine: engine.value,
    infusions: getSelectedInfusions()
  };

  localStorage.setItem("corewright_"+name, JSON.stringify(build));
  alert("Saved!");
}

// LOAD
function loadBuild() {
  const keys = Object.keys(localStorage).filter(k=>k.startsWith("corewright_"));
  const names = keys.map(k=>k.replace("corewright_","")).join("\n");

  const choice = prompt("Load build:\n"+names);
  if (!choice) return;

  const build = JSON.parse(localStorage.getItem("corewright_"+choice));

  level.value = build.level;
  int.value = build.int;
  engine.value = build.engine;

  document.querySelectorAll("#infusions input").forEach(cb=>{
    cb.checked = build.infusions.includes(cb.value);
  });

  buildGolem();
}

// SHARE
function shareBuild() {
  const build = {
    level: level.value,
    int: int.value,
    engine: engine.value,
    infusions: getSelectedInfusions()
  };

  const encoded = btoa(JSON.stringify(build));
  const url = `${location.origin}${location.pathname}?build=${encoded}`;

  navigator.clipboard.writeText(url);
  alert("Link copied!");
}

// LOAD FROM URL
function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const data = params.get("build");

  if (!data) return;

  const build = JSON.parse(atob(data));

  level.value = build.level;
  int.value = build.int;
  engine.value = build.engine;

  document.querySelectorAll("#infusions input").forEach(cb=>{
    cb.checked = build.infusions.includes(cb.value);
  });

  buildGolem();
}

// PRINT
function printGolem(){ window.print(); }

// TXT EXPORT
function downloadTxt(){
  let blob = new Blob([statblock.innerText], {type:'text/plain'});
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'golem.txt';
  a.click();
}

// INIT
window.addEventListener("load", ()=>{
  loadFromURL();
  buildGolem();
});

</script>

</body>
</html>
