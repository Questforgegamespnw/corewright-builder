<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Questforge Corewright Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- Navigation -->
<div class="nav">
  <a href="./">Builder</a>
  <a href="./infusions/">Infusions</a>
  <a href="./corewright/">Subclass</a>
</div>

<!-- Splash Screen -->
<div id="splash">
  <h1>Questforge Corewright Interface</h1>
  <button onclick="enterApp()">Enter Workshop</button>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <div class="container">

    <!-- Assembly Card -->
    <div class="card">
      <h2>Assembly</h2>
      Level <input id="level" type="number" value="10"><br>
      INT Mod <input id="int" type="number" value="4"><br>

      Engine
      <select id="engine">
        <option value="none">None</option>
        <option value="flame">Flame</option>
        <option value="stone">Stone</option>
        <option value="frost">Frost</option>
        <option value="aether">Aether</option>
      </select>

      <br><br>

      Mode
      <select id="mode">
        <option value="single">Single Golem</option>
        <option value="multi">Multi-Golem</option>
        <option value="fusion">Fusion Mode</option>
      </select>

      <!-- Infusions for Golem One -->
      <div id="infusions" class="container">
        <h2>Infusions</h2>
        <!-- Cards for each infusion will be injected here by JS -->
      </div>

      <!-- Infusions for Golem Two -->
      <div id="infusions2" class="container" style="display:none;">
        <h2>Second Golem Infusions</h2>
        <!-- Cards for each infusion will be injected here by JS -->
      </div>

      <br>
      <button onclick="printGolem()">Print / Save PDF</button>
      <button onclick="downloadTxt()">Download .txt</button>
      <button onclick="saveBuild()">Save Build</button>
      <button onclick="loadBuild()">Load Build</button>
      <button onclick="shareBuild()">Share Build</button>
    </div>

    <!-- Second Golem Card -->
    <div id="golem2" class="card" style="display:none;">
      <h2>Second Golem</h2>
      Level <input id="level2" type="number" value="10"><br>
      INT Mod <input id="int2" type="number" value="4"><br>

      Engine
      <select id="engine2">
        <option value="none">None</option>
        <option value="flame">Flame</option>
        <option value="stone">Stone</option>
        <option value="frost">Frost</option>
        <option value="aether">Aether</option>
      </select>
    </div>

    <!-- Stat Block -->
    <div class="card">
      <h2>Golem Stat Block</h2>
      <div id="statblock"></div>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="./js/infusions.js"></script>
<script src="./js/builder.js"></script>

<!-- Splash and Mode Toggle -->
<script>
  function enterApp(){
    document.getElementById('splash').style.display='none';
    document.getElementById('app').style.display='block';
  }

  // Show/hide second golem and its infusions based on mode
  document.getElementById("mode").addEventListener("change", () => {
    const mode = document.getElementById("mode").value;
    const golem2 = document.getElementById("golem2");
    const infusions2 = document.getElementById("infusions2");

    if (mode === "multi" || mode === "fusion") {
      golem2.style.display = "block";
      infusions2.style.display = "block";
    } else {
      golem2.style.display = "none";
      infusions2.style.display = "none";
    }
  });
</script>

</body>
</html>
