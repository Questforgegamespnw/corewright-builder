<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Questforge Corewright Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Georgia, serif; margin:0; background:#e8dcc3; }

#splash {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(#2f2a24,#5a4a32);
  color:#fdf6e3;
}

.container { max-width:1100px; margin:auto; padding:15px; }
.card { background:#fdf6e3; padding:15px; margin-bottom:15px; border:2px solid #8b7355; border-radius:10px; }

button { margin:5px; padding:10px; font-size:1em; }

.nav {
  text-align:center;
  background:#5a4a32;
  padding:10px;
  position: sticky;
  top: 0;
}
.nav a {
  color:#fdf6e3;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

#statblock {
  background:#fdf1dc;
  border:2px solid #3b2f1b;
  border-radius:6px;
  padding:16px;
}

.stat-header { border-bottom:3px solid #3b2f1b; margin-bottom:8px; }
.stat-name { font-size:1.6em; font-weight:bold; }
.stat-type { font-style:italic; }

.stat-section { border-top:2px solid #3b2f1b; margin-top:10px; padding-top:6px; }

.ability-grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  text-align:center;
  margin-top:8px;
}

.ability-grid div {
  border:1px solid #3b2f1b;
  padding:4px;
  background:#fff8e7;
}

@media print {
  body * { visibility:hidden; }
  #statblock, #statblock * { visibility:visible; }

  #statblock {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    border:none;
  }

  button { display:none; }
}
</style>
</head>

<body>

<div class="nav">
  <a href="/corewright-builder/">Builder</a>
  <a href="/corewright-builder/infusions/">Infusions</a>
  <a href="/corewright-builder/corewright/">Subclass</a>
</div>

<div id="splash">
  <h1>Questforge Corewright Interface</h1>
  <button onclick="enterApp()">Enter Workshop</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="card">
<h2>Assembly</h2>

Level <input id="level" type="number" value="10"><br>
INT Mod <input id="int" type="number" value="4"><br>

Engine
<select id="engine">
<option value="none">None</option>
<option value="flame">Flame</option>
<option value="stone">Stone</option>
<option value="frost">Frost</option>
<option value="aether">Aether</option>
</select>

<div id="infusions"></div>

<br>
<button onclick="printGolem()">Print / Save PDF</button>
<button onclick="downloadTxt()">Download .txt</button>

</div>

<div class="card">
<h2>Golem Stat Block</h2>
<div id="statblock"></div>
</div>

</div>
</div>

<script src="js/infusions.js"></script>

<script>

function enterApp(){
 document.getElementById('splash').style.display='none';
 document.getElementById('app').style.display='block';
}

// Render Infusions
const infusionContainer = document.getElementById("infusions");

function renderInfusions() {
  infusionContainer.innerHTML = "<h3>Infusions</h3>";

  Object.entries(INFUSIONS).forEach(([key, infusion]) => {
    infusionContainer.innerHTML += `
      <label>
        <input type="checkbox" value="${key}">
        ${infusion.name}
      </label><br>
    `;
  });
}
renderInfusions();

function getSelectedInfusions() {
  return [...document.querySelectorAll("#infusions input:checked")]
    .map(cb => cb.value);
}

// MAIN BUILDER
function buildGolem() {

  const player = {
    level: parseInt(level.value),
    intMod: parseInt(int.value),
    pb: Math.ceil((level.value - 1)/4) + 1
  };

  let golem = {
    hp: 50,
    ac: 15,
    str: 14,
    con: 14,
    dex: 10,
    speed: 30,
    reach: 5
  };

  // ENGINE
  const engine = engineSelect.value;
  golem.engineName = "None";
  golem.engineEffects = [];

  switch (engine) {
    case "flame":
      golem.engineName = "Flame Engine";
      golem.resistances = ["fire"];
      golem.bonusDamage = player.intMod;
      break;

    case "stone":
      golem.engineName = "Stone Engine";
      golem.damageReduction = player.pb;
      break;

    case "frost":
      golem.engineName = "Frost Engine";
      golem.resistances = ["cold"];
      break;

    case "aether":
      golem.engineName = "Aether Engine";
      golem.flySpeed = golem.speed;
      golem.phasing = true;
      break;
  }

  // INFUSIONS
  getSelectedInfusions().forEach(key => {
    const infusion = INFUSIONS[key];
    if (infusion) infusion.apply(golem, player);
  });

  // OUTPUT
  const statblock = document.getElementById("statblock");

  statblock.innerHTML = `
    <div class="stat-header">
      <div class="stat-name">Custom Golem</div>
      <div class="stat-type">Construct</div>
    </div>

    <div><strong>AC</strong> ${golem.ac}</div>
    <div><strong>HP</strong> ${golem.hp}</div>
    <div><strong>Speed</strong> ${golem.speed} ft${golem.flySpeed ? ", fly " + golem.flySpeed : ""}</div>

    <div class="ability-grid">
      <div><strong>STR</strong><br>${golem.str}</div>
      <div><strong>DEX</strong><br>${golem.dex}</div>
      <div><strong>CON</strong><br>${golem.con}</div>
      <div><strong>INT</strong><br>-</div>
      <div><strong>WIS</strong><br>-</div>
      <div><strong>CHA</strong><br>-</div>
    </div>

    <div class="stat-section">
      <strong>Engine</strong><br>${golem.engineName}
    </div>

    <div class="stat-section">
      <strong>Traits</strong>
      <ul>
        ${golem.damageReduction ? `<li>Reduce damage by ${golem.damageReduction}</li>` : ""}
        ${golem.phasing ? `<li>Can move through objects</li>` : ""}
      </ul>
    </div>

    <div class="stat-section">
      <strong>Actions</strong>
      <ul>
        <li>Slam: ${Math.floor(golem.str/2)+3} damage</li>
      </ul>
    </div>

    <div class="stat-section">
      <strong>Infusions</strong><br>
      ${getSelectedInfusions().map(k=>INFUSIONS[k].name).join(", ") || "None"}
    </div>
  `;
}

// PRINT
function printGolem() {
  window.print();
}

// TXT EXPORT
function downloadTxt(){
  let text = document.getElementById("statblock").innerText;
  let blob = new Blob([text], { type: 'text/plain' });
  let url = URL.createObjectURL(blob);

  let a = document.createElement('a');
  a.href = url;
  a.download = 'golem.txt';
  a.click();
}
// AUTO UPDATE SYSTEM

function setupAutoUpdate() {

  // Inputs
  document.getElementById("level").addEventListener("input", buildGolem);
  document.getElementById("int").addEventListener("input", buildGolem);
  document.getElementById("engine").addEventListener("change", buildGolem);

  // Infusion checkboxes (dynamic)
  document.getElementById("infusions").addEventListener("change", buildGolem);
}

// Run once on load
setupAutoUpdate();

// Build once at start so it's not empty
buildGolem();
</script>

</body>
</html>
