<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corewright Infusion Compendium</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.collapsible {
  cursor: pointer;
  padding: 10px;
  background: #8b7355;
  color: white;
  border: none;
  width: 100%;
  text-align: left;
  font-size: 1em;
  border-radius: 6px;
  margin-top: 10px;
}

.content {
  display: none;
  padding: 10px 15px;
  background: #fffaf0;
  border: 1px solid #8b7355;
  border-radius: 6px;
  margin-bottom: 10px;
}

.filter-bar {
  text-align: center;
  margin-bottom: 15px;
}

.filter-bar button {
  margin: 5px;
}

#search {
  padding: 8px;
  width: 60%;
  max-width: 300px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="../">Builder</a>
  <a href="./">Infusions</a>
  <a href="../corewright/">Subclass</a>
</div>

<div class="container">

<h1>Corewright Infusion Compendium</h1>

<!-- SEARCH -->
<div class="filter-bar">
  <input type="text" id="search" placeholder="Search infusions..." oninput="renderInfusionList()">
</div>

<!-- FILTER BUTTONS -->
<div class="filter-bar">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('tank')">Tank</button>
  <button onclick="setFilter('dps')">DPS</button>
  <button onclick="setFilter('control')">Control</button>
  <button onclick="setFilter('utility')">Utility</button>
</div>

<!-- INFUSION LIST -->
<div id="infusion-list"></div>

</div>

<script src="../js/infusions.js"></script>

<script>
let currentFilter = "all";

function setFilter(filter) {
  currentFilter = filter;
  renderInfusionList();
}

function renderInfusionList() {
  const container = document.getElementById("infusion-list");
  const search = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  const tiers = {
    base: "Base Infusions",
    advanced: "Advanced Infusions (9th Level)",
    masterwork: "Masterwork Infusions (15th Level)"
  };

  Object.entries(tiers).forEach(([tierKey, tierName]) => {

    const section = document.createElement("div");
    const header = document.createElement("h2");
    header.textContent = tierName;
    section.appendChild(header);

    let hasContent = false;

    Object.entries(INFUSIONS).forEach(([key, infusion]) => {

      // TIER CHECK
      if (infusion.tier !== tierKey) return;

      // TAG FILTER
      if (
        currentFilter !== "all" &&
        (!infusion.tags || !infusion.tags.map(t => t.toLowerCase()).includes(currentFilter))
      ) return;

      // SEARCH FILTER
      const text = (infusion.name + infusion.effect + infusion.details).toLowerCase();
      if (!text.includes(search)) return;

      hasContent = true;

      const card = document.createElement("div");
      card.className = "card";

      const button = document.createElement("button");
      button.className = "collapsible";
      button.textContent = infusion.name;

      const content = document.createElement("div");
      content.className = "content";

      // TAGS
      if (infusion.tags) {
        infusion.tags.forEach(tag => {
          const span = document.createElement("span");
          span.className = `tag ${tag.toLowerCase()}`;
          span.textContent = tag;
          content.appendChild(span);
        });
      }

// DETAILS
const details = document.createElement("p");
details.innerHTML = `<strong>Details:</strong> ${infusion.details}`;
content.appendChild(details);

// ===== LORE / MECHANICS PANEL =====
if (infusion.lore || infusion.mechanics) {

  const loreButton = document.createElement("button");
  loreButton.className = "collapsible";
  loreButton.textContent = "Show Lore & Mechanics";

  const loreContent = document.createElement("div");
  loreContent.className = "content";

  if (infusion.lore) {
    const lore = document.createElement("p");
    lore.innerHTML = `<strong>Lore:</strong> ${infusion.lore}`;
    loreContent.appendChild(lore);
  }

  if (infusion.mechanics) {
    const mech = document.createElement("p");
    mech.innerHTML = `<strong>Mechanics:</strong> ${infusion.mechanics}`;
    loreContent.appendChild(mech);
  }

  content.appendChild(loreButton);
  content.appendChild(loreContent);
}

// NOW finish building the card
card.appendChild(button);
card.appendChild(content);
section.appendChild(card);
    }
  });

  // COLLAPSIBLE
  const col = document.getElementsByClassName("collapsible");
  for (let i = 0; i < col.length; i++) {
    col[i].addEventListener("click", function () {
      this.classList.toggle("active");
      const content = this.nextElementSibling;
      content.style.display =
        content.style.display === "block" ? "none" : "block";
    });
  }
}

window.addEventListener("load", renderInfusionList);
</script>

</body>
</html>
