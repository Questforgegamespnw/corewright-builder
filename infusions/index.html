<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corewright Infusion Compendium</title>
<style>
body {
  font-family: Georgia, serif;
  background: #e8dcc3;
  margin: 0;
}
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}
.card {
  background: #fdf6e3;
  border: 2px solid #8b7355;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
}
h1, h2 {
  text-align: center;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  margin-right: 5px;
  border-radius: 5px;
  font-size: 0.8em;
}
.tank { background: #4CAF50; color: white; }
.dps { background: #f44336; color: white; }
.control { background: #2196F3; color: white; }
.utility { background: #9C27B0; color: white; }
.collapsible {
  cursor: pointer;
  padding: 10px;
  border: none;
  text-align: left;
  width: 100%;
  background: #8b7355;
  color: white;
  font-size: 1em;
  margin-top: 10px;
}
.content {
  display: none;
  padding: 10px;
  background: #fffaf0;
  border: 1px solid #8b7355;
}
</style>
</head>
<body>

<div class="container">
<h1>Corewright Infusion Compendium</h1>

<button class="collapsible">Reinforced Frame</button>
<div class="content">
<span class="tag tank">Tank</span>
<p>HP increases by artificer level. +1 AC.</p>
</div>

<button class="collapsible">War Construct</button>
<div class="content">
<span class="tag dps">DPS</span>
<p>Two attacks. Each attack deals +1d6 damage.</p>
</div>

<button class="collapsible">Dexterous Manipulators</button>
<div class="content">
<span class="tag utility">Utility</span>
<p>DEX 14, weapon use, object interaction.</p>
</div>

<button class="collapsible">Reactive Plating</button>
<div class="content">
<span class="tag tank">Tank</span>
<p>Reduce damage by 1d10 + PB as reaction.</p>
</div>

<button class="collapsible">Overcharged Core</button>
<div class="content">
<span class="tag dps">DPS</span>
<p>+10 damage once per turn. Takes PB damage.</p>
</div>

</div>

<script>
let col = document.getElementsByClassName("collapsible");
for (let i = 0; i < col.length; i++) {
  col[i].addEventListener("click", function() {
    this.classList.toggle("active");
    let content = this.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
  });
}
</script>

</body>
</html>
