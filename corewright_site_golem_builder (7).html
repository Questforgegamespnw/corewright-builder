<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Corewright Builder v10 (Polished)</title>
<style>
body { font-family: Georgia, serif; background:#e8dcc3; padding:20px; }
.container { max-width:1200px; margin:auto; }
.card { background:#fdf6e3; padding:15px; margin-bottom:15px; border:2px solid #8b7355; border-radius:12px; box-shadow:2px 2px 8px rgba(0,0,0,0.2);} 
button { margin:5px; padding:8px 12px; cursor:pointer; border-radius:6px; }

.statblock {
  background:#fffaf0;
  border:4px solid #3b2f2f;
  padding:20px;
  margin-top:10px;
}
.statblock h2 {
  border-bottom:3px solid #3b2f2f;
  font-family: "Cinzel", serif;
}
.section { margin-top:8px; }
.section strong { border-bottom:1px solid #999; display:block; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media print {
  body { background:white; }
  .card:not(.printable) { display:none; }
}
</style>
</head>
<body>
<div class="container">
<h1>Corewright Arcane Assembly v10</h1>

<div class="card">
<h2>Assembly</h2>
Level <input id="level" type="number" value="10"><br>
INT Mod <input id="int" type="number" value="4"><br>

Template <select id="template"><option>Stone</option><option>Metal</option><option>Wood</option><option>Cloth</option><option>Blood</option></select>
Engine <select id="engine"><option value="none">None</option><option value="flame">Flame</option><option value="stone">Stone</option><option value="frost">Frost</option><option value="aether">Aether</option></select>

<div id="infusions"></div>

Modes<br>
<input type="checkbox" id="dual"> Dual Core
<input type="checkbox" id="fusion"> Fusion Mode

<br>
<button onclick="build()">Activate Core</button>
<button onclick="window.print()">Print</button>
</div>

<div class="card printable">
<h2>Construct Output</h2>
<div id="out"></div>
</div>

</div>

<script>
function PB(l){ return Math.ceil(l/4)+1 }
function mod(s){ return Math.floor((s-10)/2); }
function die(l){ return l>=15?"1d10":l>=9?"1d8":"1d6" }

const engines={
flame:(pb)=>({dmg:"1d8 fire",trait:`Burning Aura (${pb})`} ),
stone:(pb)=>({trait:`DR ${pb}`} ),
frost:()=>({dmg:"1d6 cold",trait:"No reactions"}),
aether:()=>({speed:20,trait:"Flying"})
};

const infusions={
reinforced:(l)=>({hp:l,ac:1}),
war:()=>({multi:2,dmg:"1d6"}),
servo:()=>({speed:10}),
overdrive:(pb)=>({extra:1,self:pb}),
giant:(l)=>({hp:l*2,str:2,con:2,speed:-10})
};

let infDiv=document.getElementById('infusions');
Object.keys(infusions).forEach(k=>{
infDiv.innerHTML+=`<input type='checkbox' value='${k}'> ${k}<br>`});

function makeBlock(name,data){
return `<div class="statblock">
<h2>${name}</h2>
<div class="section"><strong>AC</strong> ${data.ac}</div>
<div class="section"><strong>HP</strong> ${data.hp}</div>
<div class="section"><strong>Speed</strong> ${data.speed}</div>
<div class="section"><strong>STR</strong> ${data.STR} (${mod(data.STR)})</div>
<div class="section"><strong>Traits</strong> ${data.traits.join('<br>')}</div>
<div class="section"><strong>Actions</strong> ${data.attacks} attacks, ${data.dmg}</div>
</div>`;
}

function build(){
let lvl=+level.value;
let int=+int.value;
let pb=PB(lvl);

let base={ac:13+pb,hp:5+lvl*5,speed:30,STR:14,CON:14,traits:[],attacks:1,dmg:`${die(lvl)}+${pb}`};

let eng=engine.value;
if(eng!="none"){
let e=engines[eng](pb);
if(e.dmg) base.dmg+=`+${e.dmg}`;
if(e.speed) base.speed+=e.speed;
if(e.trait) base.traits.push(e.trait);
}

[...document.querySelectorAll('#infusions input:checked')].forEach(i=>{
let d=infusions[i.value](lvl,pb);
if(d.hp) base.hp+=d.hp;
if(d.ac) base.ac+=d.ac;
if(d.speed) base.speed+=d.speed;
if(d.str) base.STR+=d.str;
if(d.multi) base.attacks=d.multi;
if(d.extra) base.attacks+=d.extra;
if(d.dmg) base.dmg+=`+${d.dmg}`;
});

if(fusion.checked){
out.innerHTML=makeBlock("Fusion Construct",base);
return;
}

if(dual.checked){
out.innerHTML=`<div class="grid">${makeBlock("Golem A",base)}${makeBlock("Golem B",base)}</div>`;
return;
}

out.innerHTML=makeBlock("Golem",base);
}
</script>
</body>
</html>
